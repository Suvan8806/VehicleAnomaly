# VehicleAnomalyNet — Fan-only (per-type training)
# Use for: pipeline, train, eval for fan. Checkpoint: checkpoints/fan.pt

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed_fan"
  metadata_path: "data/processed_fan/metadata.csv"
  machine_types: ["fan"]
  snr_levels: [-6, 0, 6]
  augment_factor: 3
  max_generated_samples: 3000
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15
  max_label_ratio: 0.50
  segment_length_s: 4.0
  sample_rate: 16000

features:
  n_mels: 128
  n_fft: 1024
  hop_length: 512
  f_min: 20.0
  f_max: 8000.0
  n_mfcc: 40
  target_frames: 128
  feature_type: "log_mel"

model:
  cnn_channels: [24, 48, 96]
  gru_hidden: 192
  gru_layers: 2
  gru_bidirectional: true
  dropout: 0.55
  n_fault_classes: 7  # normal + 6 faults (3 fan + 3 slider; head size unchanged for loading)

training:
  batch_size: 64
  epochs: 50
  lr: 0.001
  weight_decay: 0.0005
  optimizer: "AdamW"
  scheduler: "CosineAnnealingLR"
  early_stopping_patience: 10
  # Stop when val metric reaches target (training can run different epoch counts per type)
  target_val_auc_roc: null   # disable AUC target for now; rely on early stopping
  # target_val_loss: 0.5     # optional: stop when val loss <= this
  loss_weights:
    anomaly: 1.0
    fault: 0.5
  anomaly_pos_weight: 0.8
  device: "auto"
  checkpoint_dir: "checkpoints/"
  best_model_path: "checkpoints/fan.pt"

evaluation:
  anomaly_threshold: 0.5
  results_dir: "results_fan/"

export:
  onnx_path: "vehicleanomalynet.onnx"
  benchmark_runs: 500
  warmup_runs: 200
  batch_sizes: [1, 8, 32]

dashboard:
  port: 8501
  mlflow_tracking_uri: "mlruns/"
  n_recent_runs: 5
