# VehicleAnomalyNet Configuration
# All hyperparameters live here — no magic numbers in code

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  metadata_path: "data/processed/metadata.csv"
  machine_types: ["fan", "slider"]
  snr_levels: [-6, 0, 6]
  augment_factor: 3
  max_generated_samples: 3000
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15
  # Max fraction of a split from one label (0=normal, 1=anomaly). 0.5 = balanced; 0.75 = allow up to 75% one class.
  max_label_ratio: 0.60
  segment_length_s: 4.0
  sample_rate: 16000

features:
  n_mels: 128
  n_fft: 1024
  hop_length: 512
  f_min: 20.0
  f_max: 8000.0
  n_mfcc: 40
  target_frames: 128
  feature_type: "log_mel"  # "log_mel" | "mfcc" | "combined"

model:
  cnn_channels: [32, 64, 128]
  gru_hidden: 256
  gru_layers: 2
  gru_bidirectional: true
  dropout: 0.45  # increased from 0.3 to reduce overfitting (train loss was collapsing to 0)
  n_fault_classes: 7  # normal + 6 faults

training:
  batch_size: 64
  epochs: 50
  lr: 0.001
  weight_decay: 0.0005  # increased from 0.0001 for stronger L2 regularization
  optimizer: "AdamW"
  scheduler: "CosineAnnealingLR"
  early_stopping_patience: 10
  # Optional: stop when val metric reaches target (epochs then differ per run)
  # target_val_auc_roc: 0.75
  # target_val_loss: 0.5
  loss_weights:
    anomaly: 1.0
    fault: 0.5
  # BCE pos_weight for anomaly head: weight for positive (anomaly) class. <1 upweights normal. ~n_normal/n_anomaly for balance.
  anomaly_pos_weight: 0.67
  device: "auto" # cuda > mps > cpu
  checkpoint_dir: "checkpoints/"
  best_model_path: "checkpoints/best_model.pt"

evaluation:
  anomaly_threshold: 0.5
  results_dir: "results/"

export:
  onnx_path: "vehicleanomalynet.onnx"
  benchmark_runs: 500
  warmup_runs: 200
  batch_sizes: [1, 8, 32]

dashboard:
  port: 8501
  mlflow_tracking_uri: "mlruns/"
  n_recent_runs: 5

